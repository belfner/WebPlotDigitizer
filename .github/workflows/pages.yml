name: Deploy GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install JavaScript dependencies
        run: npm ci
      - name: Install Python build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install Jinja2 Babel mkdocs
      - name: Build WebPlotDigitizer
        run: npm run build
      - name: Assemble Pages artifact
        run: ./assemble-dist.sh
        env:
          WPD_SOURCE_LINE: https://github.com/${{ github.repository }}/commit/${{ github.sha }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
